<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker | Dashboard</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,Helvetica,sans-serif;}
body{background:#f4f6f9;}

.sidebar{
position:fixed;
top:0;
left:0;
width:230px;
height:100vh;
background:#111827;
display:flex;
flex-direction:column;
padding-top:24px;
}

.sidebar .brand{
color:#fff;
font-size:20px;
font-weight:600;
letter-spacing:.3px;
padding:0 22px 24px 22px;
}

.sidebar a{
display:flex;
align-items:center;
gap:10px;
padding:14px 22px;
color:#cbd5e1;
text-decoration:none;
font-size:15px;
font-weight:500;
border-left:3px solid transparent;
transition:background .2s,color .2s;
}
.sidebar a:hover{background:#1f2937;color:#fff;}
.sidebar a.active{background:#1f2937;color:#fff;border-left:3px solid #2563eb;}

.logout{
margin:20px 22px;
margin-top:auto;
width:calc(100% - 44px);
background:#dc2626;
color:#fff;
padding:12px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:14px;
font-weight:500;
transition:background .2s;
}
.logout:hover{background:#b91c1c;}

.main{margin-left:230px;padding:30px;min-height:100vh;}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:#fff;
padding:22px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,.08);
}
.card h3{margin-bottom:8px;color:#6b7280;font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
.card h2{color:#2563eb;font-size:26px;}

table{
width:100%;
background:#fff;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,.08);
}
th{background:#2563eb;color:#fff;padding:14px;font-size:14px;text-align:left;padding-left:20px;}
td{padding:12px 20px;border-bottom:1px solid #eee;font-size:14px;}
tr:hover{background:#f9fafb;}

@media(max-width:900px){
.cards{grid-template-columns:repeat(2,1fr);}
.sidebar{display:none;}
.main{margin-left:0;}
}
</style>
</head>

<body>

<div class="sidebar">
<div class="brand">Expense Tracker</div>
<a href="dashboard.html" class="active">🏠 Dashboard</a>
<a href="expenses.html">💸 Expenses</a>
<a href="income.html">💰 Income</a>
<a href="budget.html">📊 Budget</a>
<a href="reports.html">📈 Reports</a>
<button class="logout" onclick="logout()">Logout</button>
</div>

<div class="main">

<h1 id="welcome">Welcome</h1>
<br>

<div class="cards">
<div class="card">
<h3>Total Income</h3>
<h2 id="income">₹0</h2>
</div>

<div class="card">
<h3>Total Expense</h3>
<h2 id="expense">₹0</h2>
</div>

<div class="card">
<h3>Budget</h3>
<h2 id="budget">₹0</h2>
</div>

<div class="card">
<h3>Remaining</h3>
<h2 id="remaining">₹0</h2>
</div>
</div>

<h2>Recent Expenses</h2>
<br>

<table>
<thead>
<tr>
<th>Date</th>
<th>Category</th>
<th>Description</th>
<th>Amount</th>
</tr>
</thead>
<tbody id="expenseTable"></tbody>
</table>

</div>

<script>
const user=JSON.parse(localStorage.getItem("user"));

if(user){
document.getElementById("welcome").innerHTML="Welcome, "+user.full_name;
}

function formatDate(dateStr){
if(!dateStr) return "";
const d=new Date(dateStr);
return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric',timeZone:'UTC'});
}

fetch("/dashboard/"+user.user_id)
.then(res=>res.json())
.then(data=>{
document.getElementById("income").innerHTML="₹"+data.totalIncome;
document.getElementById("expense").innerHTML="₹"+data.totalExpense;
document.getElementById("budget").innerHTML="₹"+data.totalBudget;
document.getElementById("remaining").innerHTML="₹"+data.remaining;

let rows="";
data.recent.forEach(exp=>{
rows+=`
<tr>
<td>${formatDate(exp.expense_date)}</td>
<td>${exp.category_name}</td>
<td>${exp.description}</td>
<td>₹${exp.amount}</td>
</tr>
`;
});
document.getElementById("expenseTable").innerHTML=rows;
});

function logout(){
localStorage.clear();
window.location.href="login.html";
}
</script>

</body>
</html>
