<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Expense Reports</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
padding:30px;
}

h1{
text-align:center;
margin-bottom:30px;
color:#2563eb;
}

.cards{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
flex:1;
background:white;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,.2);
}

.card h3{
margin-bottom:10px;
}

.chart-container{
display:flex;
gap:30px;
}

.chart-box{
flex:1;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.2);
}

canvas{
height:350px !important;
}

</style>

</head>

<body>

<h1>Reports</h1>

<div class="cards">

<div class="card">
<h3>Total Income</h3>
<h2 id="income">₹0</h2>
</div>

<div class="card">
<h3>Total Expense</h3>
<h2 id="expense">₹0</h2>
</div>

<div class="card">
<h3>Remaining</h3>
<h2 id="remaining">₹0</h2>
</div>

</div>

<div class="chart-container">

<div class="chart-box">

<h3>Expenses by Category</h3>

<canvas id="pieChart"></canvas>

</div>

<div class="chart-box">

<h3>Income vs Expense</h3>

<canvas id="barChart"></canvas>

</div>

</div>

<script>

const user=JSON.parse(localStorage.getItem("user"));

fetch("/reports/"+user.user_id)

.then(res=>res.json())

.then(data=>{

document.getElementById("income").innerHTML="₹"+data.totalIncome;

document.getElementById("expense").innerHTML="₹"+data.totalExpense;

document.getElementById("remaining").innerHTML="₹"+(data.totalIncome-data.totalExpense);


// Pie Chart

new Chart(document.getElementById("pieChart"),{

type:"pie",

data:{

labels:data.categoryLabels,

datasets:[{

data:data.categoryAmounts

}]

}

});


// Bar Chart

new Chart(document.getElementById("barChart"),{

type:"bar",

data:{

labels:["Income","Expense"],

datasets:[{

label:"Amount",

data:[

data.totalIncome,

data.totalExpense

]

}]

}

});

});

</script>

</body>

</html>
