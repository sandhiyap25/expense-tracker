<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker | Expenses</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,Helvetica,sans-serif;}
body{background:#f4f6f9;}

.sidebar{
position:fixed;
top:0;
left:0;
width:230px;
height:100vh;
background:#111827;
display:flex;
flex-direction:column;
padding-top:24px;
}

.sidebar .brand{
color:#fff;
font-size:20px;
font-weight:600;
letter-spacing:.3px;
padding:0 22px 24px 22px;
}

.sidebar a{
display:flex;
align-items:center;
gap:10px;
padding:14px 22px;
color:#cbd5e1;
text-decoration:none;
font-size:15px;
font-weight:500;
border-left:3px solid transparent;
transition:background .2s,color .2s;
}
.sidebar a:hover{background:#1f2937;color:#fff;}
.sidebar a.active{background:#1f2937;color:#fff;border-left:3px solid #2563eb;}

.logout{
margin:20px 22px;
margin-top:auto;
width:calc(100% - 44px);
background:#dc2626;
color:#fff;
padding:12px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:14px;
font-weight:500;
transition:background .2s;
}
.logout:hover{background:#b91c1c;}

.main{margin-left:230px;padding:30px;min-height:100vh;}

h1.page-title{margin-bottom:20px;color:#111827;}

.content{display:flex;gap:30px;}

.form-box{
width:350px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,.08);
height:fit-content;
}
.form-box h2{margin-bottom:10px;font-size:18px;color:#111827;}

.form-box input,
.form-box select{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #d1d5db;
border-radius:6px;
font-size:14px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:14px;
font-weight:500;
}
button:hover{background:#1d4ed8;}

.table-box{
flex:1;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,.08);
}
.table-box h2{margin-bottom:10px;font-size:18px;color:#111827;}

.filter-row{
display:flex;
gap:10px;
margin-bottom:14px;
}
.filter-row select{
flex:1;
padding:8px 10px;
border:1px solid #d1d5db;
border-radius:6px;
font-size:13px;
background:#f9fafb;
}

table{width:100%;border-collapse:collapse;}
th{background:#2563eb;color:white;padding:12px;text-align:left;padding-left:16px;font-size:14px;}
td{text-align:left;padding:10px 16px;border-bottom:1px solid #eee;font-size:14px;}
tr:hover{background:#f9fafb;}

.delete{
width:auto;
background:#dc2626;
padding:8px 12px;
border:none;
color:white;
border-radius:4px;
cursor:pointer;
font-size:13px;
}
.delete:hover{background:#b91c1c;}

@media(max-width:900px){
.sidebar{display:none;}
.main{margin-left:0;}
.content{flex-direction:column;}
}
</style>
</head>

<body>

<div class="sidebar">
<div class="brand">Expense Tracker</div>
<a href="dashboard.html">🏠 Dashboard</a>
<a href="expenses.html" class="active">💸 Expenses</a>
<a href="income.html">💰 Income</a>
<a href="budget.html">📊 Budget</a>
<a href="reports.html">📈 Reports</a>
<button class="logout" onclick="logout()">Logout</button>
</div>

<div class="main">

<h1 class="page-title">Expense Management</h1>

<div class="content">

<div class="form-box">
<h2>Add Expense</h2>
<form id="expenseForm">
<select id="category"></select>
<input type="number" id="amount" placeholder="Amount" required>
<input type="date" id="date" required>
<input type="text" id="description" placeholder="Description" required>
<button type="submit">Add Expense</button>
</form>
</div>

<div class="table-box">
<h2>Expense List</h2>

<div class="filter-row">
<select id="filterMonth"></select>
<select id="filterYear"></select>
</div>

<table>
<thead>
<tr>
<th>ID</th>
<th>Category</th>
<th>Amount</th>
<th>Date</th>
<th>Description</th>
<th>Action</th>
</tr>
</thead>
<tbody id="expenseTable"></tbody>
</table>
</div>

</div>
</div>

<script>
const user = JSON.parse(localStorage.getItem("user"));

const monthNames=["January","February","March","April","May","June","July","August","September","October","November","December"];

populateFilters();
loadCategories();
loadExpenses();

function populateFilters(){
const now=new Date();
const monthSelect=document.getElementById("filterMonth");
const yearSelect=document.getElementById("filterYear");

monthNames.forEach((name,i)=>{
monthSelect.innerHTML+=`<option value="${i+1}">${name}</option>`;
});
monthSelect.value=now.getMonth()+1;

const currentYear=now.getFullYear();
for(let y=currentYear-2;y<=currentYear+1;y++){
yearSelect.innerHTML+=`<option value="${y}">${y}</option>`;
}
yearSelect.value=currentYear;

monthSelect.addEventListener("change",loadExpenses);
yearSelect.addEventListener("change",loadExpenses);
}

function loadCategories(){
fetch("/categories")
.then(res=>res.json())
.then(data=>{
let option="";
data.forEach(c=>{
option+=`<option value="${c.category_id}">${c.category_name}</option>`;
});
document.getElementById("category").innerHTML=option;
});
}

document.getElementById("expenseForm").addEventListener("submit",function(e){
e.preventDefault();

fetch("/expenses",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
user_id:user.user_id,
category_id:document.getElementById("category").value,
amount:document.getElementById("amount").value,
expense_date:document.getElementById("date").value,
description:document.getElementById("description").value
})
})
.then(res=>res.json())
.then(data=>{
alert(data.message);
document.getElementById("expenseForm").reset();
loadExpenses();
});
});

function formatDate(dateStr){
if(!dateStr) return "";
const d=new Date(dateStr);
return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric',timeZone:'UTC'});
}

function loadExpenses(){
const month=document.getElementById("filterMonth").value;
const year=document.getElementById("filterYear").value;

fetch("/expenses/"+user.user_id+"?month="+month+"&year="+year)
.then(res=>res.json())
.then(data=>{
let rows="";
data.forEach(exp=>{
rows+=`
<tr>
<td>${exp.expense_id}</td>
<td>${exp.category_name}</td>
<td>₹${exp.amount}</td>
<td>${formatDate(exp.expense_date)}</td>
<td>${exp.description}</td>
<td><button class="delete" onclick="deleteExpense(${exp.expense_id})">Delete</button></td>
</tr>
`;
});
document.getElementById("expenseTable").innerHTML=rows;
});
}

function deleteExpense(id){
if(confirm("Delete this expense?")){
fetch("/expenses/"+id,{method:"DELETE"})
.then(res=>res.json())
.then(data=>{
alert(data.message);
loadExpenses();
});
}
}

function logout(){
localStorage.clear();
window.location.href="login.html";
}
</script>

</body>
</html>
