<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker | Reports</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif;}
body{background:#f4f6f9;}

.sidebar{
position:fixed;
top:0;
left:0;
width:230px;
height:100vh;
background:#111827;
display:flex;
flex-direction:column;
padding-top:24px;
}

.sidebar .brand{
color:#fff;
font-size:20px;
font-weight:600;
letter-spacing:.3px;
padding:0 22px 24px 22px;
}

.sidebar a{
display:flex;
align-items:center;
gap:10px;
padding:14px 22px;
color:#cbd5e1;
text-decoration:none;
font-size:15px;
font-weight:500;
border-left:3px solid transparent;
transition:background .2s,color .2s;
}
.sidebar a:hover{background:#1f2937;color:#fff;}
.sidebar a.active{background:#1f2937;color:#fff;border-left:3px solid #2563eb;}

.logout{
margin:20px 22px;
margin-top:auto;
width:calc(100% - 44px);
background:#dc2626;
color:#fff;
padding:12px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:14px;
font-weight:500;
transition:background .2s;
}
.logout:hover{background:#b91c1c;}

.main{margin-left:230px;padding:30px;min-height:100vh;}

h1.page-title{text-align:center;margin-bottom:30px;color:#111827;}

.cards{display:flex;gap:20px;margin-bottom:30px;}

.card{
flex:1;
background:white;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,.08);
}
.card h3{margin-bottom:8px;color:#6b7280;font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
.card h2{color:#2563eb;font-size:26px;}

.chart-container{display:flex;gap:30px;}

.chart-box{
flex:1;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,.08);
}

canvas{height:350px !important;}

@media(max-width:900px){
.sidebar{display:none;}
.main{margin-left:0;}
.chart-container{flex-direction:column;}
}
</style>
</head>

<body>

<div class="sidebar">
<div class="brand">Expense Tracker</div>
<a href="dashboard.html">🏠 Dashboard</a>
<a href="expenses.html">💸 Expenses</a>
<a href="income.html">💰 Income</a>
<a href="budget.html">📊 Budget</a>
<a href="reports.html" class="active">📈 Reports</a>
<button class="logout" onclick="logout()">Logout</button>
</div>

<div class="main">

<h1 class="page-title">Reports</h1>

<div class="cards">
<div class="card">
<h3>Total Income</h3>
<h2 id="income">₹0</h2>
</div>

<div class="card">
<h3>Total Expense</h3>
<h2 id="expense">₹0</h2>
</div>

<div class="card">
<h3>Remaining</h3>
<h2 id="remaining">₹0</h2>
</div>
</div>

<div class="chart-container">
<div class="chart-box">
<h3>Expenses by Category</h3>
<canvas id="pieChart"></canvas>
</div>

<div class="chart-box">
<h3>Income vs Expense</h3>
<canvas id="barChart"></canvas>
</div>
</div>

</div>

<script>
const user=JSON.parse(localStorage.getItem("user"));

fetch("/reports/"+user.user_id)
.then(res=>res.json())
.then(data=>{
document.getElementById("income").innerHTML="₹"+data.totalIncome;
document.getElementById("expense").innerHTML="₹"+data.totalExpense;
document.getElementById("remaining").innerHTML="₹"+(data.totalIncome-data.totalExpense);

new Chart(document.getElementById("pieChart"),{
type:"pie",
data:{
labels:data.categoryLabels,
datasets:[{data:data.categoryAmounts}]
}
});

new Chart(document.getElementById("barChart"),{
type:"bar",
data:{
labels:["Income","Expense"],
datasets:[{
label:"Amount",
data:[data.totalIncome,data.totalExpense]
}]
}
});
});

function logout(){
localStorage.clear();
window.location.href="login.html";
}
</script>

</body>
</html>
